<article class="glass rounded-3xl p-6 hover:-translate-y-1 transition-all duration-300">

  <div
    class="h-14 w-14 rounded-2xl gradient-bg flex items-center justify-center text-2xl mb-4"
  >
    {{ s().icon }}
  </div>

  <h3 class="font-bold text-lg mb-2">
    {{ s().title }}
  </h3>

  <p class="text-muted">
    {{ s().description }}
  </p>

  <!-- BOTÓN DE ACCIÓN (ÚNICO CLICK REAL) -->
  <button
    class="mt-4 px-4 py-2 text-sm bg-black text-white rounded-lg hover:bg-gray-800 transition-all"
    (click)="selectService($event)"
  >
    Solicitar servicio →
  </button>

</article>
