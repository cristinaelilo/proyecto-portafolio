<section class="min-h-[80vh] flex items-center justify-center px-4 py-12">

  <div class="w-full max-w-md glass rounded-2xl sm:rounded-3xl p-6 sm:p-8">

    <h1 class="text-2xl sm:text-3xl font-bold text-center">Iniciar sesión</h1>
    <p class="text-muted text-center text-sm mt-2">Bienvenida de vuelta</p>

    <form (ngSubmit)="submit()" class="mt-6 sm:mt-8 space-y-4">

      <div>
        <label class="text-sm font-medium mb-1.5 block">Correo</label>
        <input
          type="email"
          placeholder="ejemplo@correo.com"
          [(ngModel)]="email"
          name="email"
          class="w-full px-4 py-3 rounded-xl bg-white/50 border border-black/10 outline-none text-sm"
        />
        @if (emailError()) {
          <p class="text-red-500 text-xs mt-1">{{ emailError() }}</p>
        }
      </div>

      <div>
        <label class="text-sm font-medium mb-1.5 block">Contraseña</label>
        <input
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          class="w-full px-4 py-3 rounded-xl bg-white/50 border border-black/10 outline-none text-sm"
        />
        @if (passwordError()) {
          <p class="text-red-500 text-xs mt-1">{{ passwordError() }}</p>
        }
      </div>

      <button
        type="submit"
        class="btn-primary w-full"
        [disabled]="loading()"
      >
        {{ loading() ? 'Ingresando...' : 'Iniciar sesión' }}
      </button>

      <button
        type="button"
        class="btn-ghost w-full"
        (click)="loginGoogle()"
        [disabled]="loading()"
      >
        <span>G</span> Ingresar con Google
      </button>

    </form>

    <p class="text-center text-sm text-muted mt-6">
      ¿No tienes cuenta?
      <a routerLink="/register" class="gradient-text font-semibold ml-1">Regístrate</a>
    </p>

  </div>

</section>
